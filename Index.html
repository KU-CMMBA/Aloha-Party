<!DOCTYPE html>
<html lang="th">
<head>
<base target="_top">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Aloha Party CMMBA 34 — ลงทะเบียน</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Prompt:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,500;1,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
  :root {
    --ocean-deep: #075985; --ocean: #0EA5E9; --ocean-light: #BAE6FD;
    --sky: #E0F2FE; --cream: #FFF8EC; --sand: #FEF3C7;
    --sunset: #F97316; --hibiscus: #EF4444; --coral: #FB7185;
    --leaf: #16A34A; --leaf-deep: #14532D; --gold: #D97706;
    --ink: #0F172A; --ink-soft: #475569;
    --shadow: 0 10px 40px -10px rgba(7,89,133,0.25);
    --shadow-lift: 0 20px 60px -15px rgba(7,89,133,0.4);
  }
  /* === Animations: หน้าให้ดูมีชีวิต === */

  /* Form mode — ซ่อน hero ทั้งหมด เหลือแค่ฟอร์ม */
  body.form-mode .hero,
  body.form-mode .hero-tag-row,
  body.form-mode .hero-meta-row {
    display: none;
  }
  body.form-mode .container {
    padding-top: 24px;
  }

  /* Step transitions — fade + slide smooth */
  #stepRoot {
    transition: opacity 0.18s ease, transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  #stepRoot.step-leaving {
    opacity: 0;
    transform: translateY(-8px);
  }
  #stepRoot.step-entering {
    opacity: 0;
    transform: translateY(12px);
    transition: none;
  }

  /* particles removed — force bg image only */

  /* Hero meta pills — micro interaction บน hover */
  .hero-meta-row span {
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
  }
  .hero-meta-row span:hover {
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 6px 16px rgba(7,89,133,0.18);
  }

  /* Tag — soft pulsing */
  .hero-tag {
    animation: tagPulse 4s ease-in-out infinite;
  }
  @keyframes tagPulse {
    0%, 100% { box-shadow: 0 2px 8px rgba(7,89,133,0.08); }
    50%      { box-shadow: 0 2px 16px rgba(254,215,170,0.45); }
  }

  /* Welcome flower — gentle floating */
  .welcome-flower {
    animation: flowerSway 5s ease-in-out infinite;
    transform-origin: center bottom;
  }
  @keyframes flowerSway {
    0%, 100% { transform: rotate(-3deg) translateY(0); }
    50%      { transform: rotate(3deg) translateY(-3px); }
  }

  /* Primary button — subtle breathing + hover lift */
  .btn-primary {
    position: relative;
    overflow: hidden;
  }
  .btn-primary::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(105deg,
      transparent 30%,
      rgba(255,255,255,0.35) 50%,
      transparent 70%);
    transition: left 0.6s ease;
    pointer-events: none;
  }
  .btn-primary:hover::before { left: 100%; }
  .btn-primary:hover {
    transform: translateY(-2px) scale(1.02);
  }

  /* Top podium rows — shimmer subtle bg */
  @keyframes shimmerSlide {
    0%   { left: -150%; }
    50%  { left: 150%; }
    100% { left: 150%; }
  }

  /* Splash overlay (during initial load) */
  #splash {
    position: fixed; inset: 0;
    z-index: 9999;
    background: linear-gradient(180deg, var(--sky) 0%, #FFF8EC 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    transition: opacity 0.5s ease, visibility 0.5s ease;
  }
  #splash.splash-hide {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  .splash-spinner {
    width: 48px; height: 48px;
    border: 4px solid rgba(7,89,133,0.15);
    border-top-color: var(--sunset);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  .splash-text {
    color: var(--ocean-deep);
    font-size: 16px;
    font-weight: 600;
    text-align: center;
    line-height: 1.5;
  }
  .splash-text small {
    font-size: 13px;
    color: var(--ink-soft);
    font-weight: 400;
  }

  /* App root — invisible until ready */
  .app-root {
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .app-root.app-ready {
    opacity: 1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: 'Prompt', sans-serif;
    color: var(--ink);
    background: #FFF8EC;
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.6;
    font-weight: 400;
  }

  /* ===== Background images (loaded via JS from Drive) ===== */
  /* Landscape (PC / tablet landscape / phone landscape) = bg-aloha.png */
  body.has-bg-image {
    background:
      linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.45) 60%, rgba(255,255,255,0.85) 100%),
      var(--bg-image-landscape, none) center center / cover no-repeat fixed;
  }
  body.has-bg-image.landing-mode {
    background: var(--bg-image-landscape, none) center center / cover no-repeat fixed;
  }
  /* Portrait (phone portrait / tablet portrait) = bg-mobile.png */
  @media (orientation: portrait) {
    body.has-bg-image {
      background:
        linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.45) 60%, rgba(255,255,255,0.85) 100%),
        var(--bg-image-portrait, none) center center / cover no-repeat fixed;
    }
    body.has-bg-image.landing-mode {
      background: var(--bg-image-portrait, none) center center / cover no-repeat fixed;
    }
  }

  .container {
    position: relative; z-index: 10;
    max-width: 1180px; margin: 0 auto;
    padding: 32px 24px 80px;
  }

  /* Single-column form layout */
  .form-column {
    max-width: 760px;
    margin: 0 auto;
  }
  /* Landing mode — กว้างเต็มพื้นที่เพื่อ welcome-split 2 col */
  body.landing-mode .form-column {
    max-width: 1100px;
  }
  @media (max-width: 960px) {
    .container { max-width: 720px; padding: 24px 16px 60px; }
  }

  /* Landing mode — allow normal scrolling (no viewport-height constraint) */
  body.landing-mode .hero { flex-shrink: 0; }
  body.landing-mode footer {
    margin-top: 16px;
  }

  /* Hero — 2 columns: left = logos+tag, right = aloha logo */
  .hero {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    text-align: left;
    margin: 0 auto 18px;
    max-width: 1000px;
    animation: dropIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .hero-left {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
    flex-shrink: 0;
  }
  .hero-right {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
  }
  @media (max-width: 768px) {
    .hero {
      flex-direction: column;
      text-align: center;
      gap: 14px;
    }
  }

  /* Hero meta — pill (ใต้ hero, กลางจอ) */
  .hero-meta-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin: 0 auto 22px;
    max-width: 100%;
    animation: dropIn 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .hero-meta-row span {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.95);
    border-radius: 100px;
    box-shadow: 0 3px 10px rgba(7,89,133,0.1);
    color: var(--ocean-deep);
    font-size: 16px;
    font-weight: 600;
  }
  body.landing-mode .hero-meta-row { margin-bottom: 10px; gap: 8px; }
  body.landing-mode .hero-meta-row span { padding: 6px 14px; font-size: 13px; }
  @media (max-width: 600px) {
    .hero-meta-row span { font-size: 13px; padding: 7px 14px; }
  }

  /* Logo bar inside hero-left */
  .logo-bar {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo-bar img {
    height: 56px;
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.15));
  }
  .logo-divider {
    width: 1px;
    height: 38px;
    background: rgba(7,89,133,0.3);
  }
  body.landing-mode .logo-bar img { height: 38px; }
  body.landing-mode .logo-divider { height: 26px; }
  @media (max-width: 600px) {
    .logo-bar img { height: 38px; }
    .logo-bar { gap: 10px; }
    .logo-divider { height: 28px; }
  }

  /* Aloha logo (right side) */
  .hero-right {
    position: relative;
  }
  .hero-logo {
    display: block;
    max-width: 100%;
    width: clamp(280px, 38vw, 460px);
    height: auto;
    filter:
      drop-shadow(0 4px 16px rgba(0,0,0,0.12))
      drop-shadow(0 0 20px rgba(255,255,255,0.5));
    position: relative;
    z-index: 1;
    animation: heroBreathe 3s ease-in-out infinite;
    transform-origin: center center;
  }
  @keyframes heroBreathe {
    0% {
      filter:
        drop-shadow(0 4px 16px rgba(0,0,0,0.12))
        drop-shadow(0 0 14px rgba(255,255,255,0.35));
      transform: scale(0.94) rotate(-2deg);
    }
    50% {
      filter:
        drop-shadow(0 4px 16px rgba(0,0,0,0.12))
        drop-shadow(0 0 32px rgba(254,215,170,0.7));
      transform: scale(1.06) rotate(2deg);
    }
    100% {
      filter:
        drop-shadow(0 4px 16px rgba(0,0,0,0.12))
        drop-shadow(0 0 14px rgba(255,255,255,0.35));
      transform: scale(0.94) rotate(-2deg);
    }
  }

  .hero-logo-wrap {
    position: relative;
    display: inline-block;
    line-height: 0;
  }

  body.landing-mode .hero-logo {
    width: clamp(180px, 22vw, 270px);
  }
  @media (max-width: 768px) {
    .hero-logo { width: clamp(240px, 60vw, 380px); }
  }

  /* Hero tag */
  .hero-tag-row {
    display: flex;
    justify-content: center;
    margin: 4px 0 14px;
    animation: dropIn 0.85s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  body.landing-mode .hero-tag-row { margin: 0 0 8px; }
  body.landing-mode .hero { margin: 0 auto 8px; gap: 18px; flex-shrink: 0; }
  .hero-tag {
    display: inline-block;
    font-size: 12px; letter-spacing: 3.5px;
    font-weight: 600; color: var(--ocean-deep);
    text-transform: uppercase;
    background: rgba(255,255,255,0.85);
    padding: 7px 18px; border-radius: 100px;
    backdrop-filter: blur(8px);
    box-shadow: 0 2px 8px rgba(7,89,133,0.08);
  }
  body.landing-mode .hero-tag { font-size: 11px; padding: 6px 16px; }

  /* Hero meta — pill */
  .hero-meta {
    display: flex; flex-wrap: wrap; gap: 8px;
    color: var(--ocean-deep);
    font-size: 14px; font-weight: 500;
  }
  .hero-meta span {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.9);
    border-radius: 100px;
    box-shadow: 0 2px 8px rgba(7,89,133,0.08);
  }
  body.landing-mode .hero-meta { font-size: 13px; gap: 6px; }
  body.landing-mode .hero-meta span { padding: 5px 12px; }

  /* hero text fallback removed — force logoAloha only */

  /* Progress */
  .progress-wrap {
    background: rgba(255,255,255,0.5); border-radius: 100px;
    padding: 4px; margin-bottom: 24px; backdrop-filter: blur(8px);
    box-shadow: inset 0 1px 2px rgba(7,89,133,0.1);
  }
  .progress-bar {
    height: 6px;
    background: linear-gradient(90deg, var(--ocean) 0%, var(--sunset) 50%, var(--hibiscus) 100%);
    border-radius: 100px; width: 5%;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Card — Bento style */
  .card {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border-radius: 28px;
    padding: 36px 32px;
    box-shadow:
      0 1px 0 rgba(255,255,255,1) inset,
      0 4px 12px -2px rgba(7,89,133,0.08),
      0 24px 48px -16px rgba(7,89,133,0.18);
    border: 1px solid rgba(255,255,255,0.9);
    animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    margin-bottom: 18px;
  }
  @media (max-width: 600px) {
    .card { padding: 28px 22px; border-radius: 22px; }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .step-label {
    font-size: 12px; letter-spacing: 2.5px; color: var(--sunset);
    font-weight: 700; text-transform: uppercase; margin-bottom: 10px;
  }
  .step-title {
    font-size: 30px; font-weight: 700; color: var(--ocean-deep);
    line-height: 1.25; margin-bottom: 10px; letter-spacing: -0.3px;
  }
  .step-desc {
    color: var(--ink-soft); font-size: 16px; line-height: 1.7; margin-bottom: 28px;
  }

  /* Welcome card */
  .welcome-card {
    text-align: center;
    padding: 36px 32px !important;
    position: relative;
    overflow: hidden;
  }
  .welcome-flower {
    display: block;
    margin: 0 auto 12px;
    width: clamp(70px, 9vw, 100px);
    height: auto;
    filter: drop-shadow(0 4px 12px rgba(217,119,6,0.2));
  }
  body.landing-mode .welcome-flower {
    width: clamp(70px, 7vw, 90px);
    margin-bottom: 8px;
  }
  body.landing-mode .welcome-card {
    padding: 18px 22px !important;
    justify-content: center;
    align-items: stretch;
    display: flex;
    flex-direction: column;
  }
  body.landing-mode .welcome-flower {
    width: clamp(48px, 5vw, 60px);
    margin-bottom: 2px;
  }
  body.landing-mode .welcome-h {
    font-size: 26px;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }
  body.landing-mode .welcome-p {
    font-size: 16px;
    line-height: 1.55;
    margin-bottom: 6px;
  }
  body.landing-mode .welcome-deadline {
    font-size: 15px;
    margin-top: 2px;
  }
  body.landing-mode .welcome-card .notice {
    padding: 10px 14px;
    font-size: 14px;
    line-height: 1.6;
    margin: 6px 0 8px;
  }
  body.landing-mode .btn-hero {
    padding: 11px 26px;
    font-size: 16px;
    margin-top: 0;
  }
  body.landing-mode .btn-link-edit {
    font-size: 13px;
    margin-top: 6px;
    padding: 4px 10px;
  }
  .welcome-card::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 240px; height: 240px;
    background: radial-gradient(circle, rgba(249,115,22,0.12) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  .welcome-card::after {
    content: '';
    position: absolute;
    bottom: -100px; left: -60px;
    width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(14,165,233,0.1) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  .welcome-emoji {
    font-size: 56px; margin-bottom: 16px;
    position: relative;
    animation: floatGentle 4s ease-in-out infinite;
  }
  @keyframes floatGentle {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .welcome-h {
    font-family: 'Prompt', sans-serif;
    font-weight: 700;
    font-size: 32px;
    background: linear-gradient(135deg, var(--ocean-deep) 0%, var(--sunset) 100%);
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
    margin-bottom: 14px;
    letter-spacing: -0.3px;
    position: relative;
  }
  .welcome-p {
    color: var(--ink-soft); font-size: 16px; line-height: 1.8;
    margin-bottom: 24px;
    position: relative;
  }
  .welcome-p strong { color: var(--sunset); font-weight: 700; }
  .welcome-deadline {
    display: inline-block;
    margin-top: 8px;
    color: #DC2626;
    font-weight: 700;
    font-size: 0.95em;
  }
  .btn-hero {
    margin-top: 0;
    padding: 16px 32px;
    font-size: 17px;
    position: relative;
  }
  .welcome-actions {
    display: flex;
    flex-direction: row;
    align-items: stretch;
    justify-content: center;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: nowrap;
  }
  .welcome-actions .btn-hero {
    font-size: 18px;
    padding: 14px 28px;
    flex: 2;
  }
  .btn-sub {
    font-size: 14px;
    padding: 10px 16px;
    background: rgba(14, 165, 233, 0.08);
    color: var(--ocean-deep);
    border: 1px solid rgba(14, 165, 233, 0.18);
    flex: 1;
    white-space: nowrap;
  }
  .btn-sub:hover {
    background: rgba(14, 165, 233, 0.14);
    border-color: rgba(14, 165, 233, 0.3);
  }
  body.landing-mode .welcome-actions {
    gap: 6px;
    margin-top: 8px;
  }
  body.landing-mode .welcome-actions .btn-hero {
    font-size: 15px;
    padding: 11px 18px;
  }
  body.landing-mode .btn-sub {
    font-size: 12px;
    padding: 8px 10px;
  }
  @media (max-width: 540px) {
    .welcome-actions { flex-wrap: wrap; }
    .welcome-actions .btn-hero { flex: 1 1 100%; }
    .btn-sub { flex: 1 1 calc(50% - 4px); }
  }

  /* ===== Welcome split (2-column layout for welcome page) ===== */
  .welcome-split {
    display: grid;
    grid-template-columns: 1.8fr 1fr;
    gap: 24px;
    align-items: stretch;
    width: 100%;
  }
  .welcome-split-left {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .welcome-split-left > .welcome-card {
    margin-bottom: 0;
  }
  .welcome-split-right {
    display: flex;
    flex-direction: column;
    gap: 30px;
    justify-content: center;
    height: 100%;
  }
  /* Mobile / narrow / portrait → stack เป็น column เดียว */
  @media (max-width: 900px), (orientation: portrait) {
    .welcome-split {
      grid-template-columns: 1fr;
      gap: 14px;
    }
    .welcome-split-right {
      height: auto;
      gap: 16px;
    }
  }

  /* ===== Mega buttons (ปุ่มหลักหน้า welcome) — แบน, horizontal layout ===== */
  .btn-mega {
    position: relative;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 24px 24px;
    border: none;
    border-radius: 18px;
    cursor: pointer;
    font-family: 'Prompt', sans-serif;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.15);
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.25s ease,
                filter 0.25s ease;
    overflow: hidden;
  }
  .btn-mega::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.22) 0%, transparent 50%, rgba(255,255,255,0.08) 100%);
    pointer-events: none;
  }
  .btn-mega:hover {
    transform: translateY(-2px) scale(1.015);
    filter: brightness(1.06);
  }
  .btn-mega:active {
    transform: translateY(-1px) scale(0.99);
  }
  .btn-mega-icon {
    font-size: 24px;
    line-height: 1;
    flex-shrink: 0;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.18));
  }
  .btn-mega-label {
    font-size: 19px;
    line-height: 1.1;
    letter-spacing: 0.3px;
  }
  /* sub label inline, ตามหลังด้วย separator */
  .btn-mega-sub {
    display: none; /* ปุ่มแบน ไม่ใช้ sub label */
  }

  /* Register — orange/red gradient + breathing animation */
  .btn-mega-register {
    background: linear-gradient(135deg, #F97316 0%, #EF4444 50%, #FB7185 100%);
    box-shadow:
      0 8px 20px -8px rgba(249,115,22,0.55),
      0 3px 8px -3px rgba(239,68,68,0.4);
    animation: megaBreathe 2.6s ease-in-out infinite;
  }
  .btn-mega-register:hover {
    box-shadow:
      0 12px 28px -8px rgba(249,115,22,0.7),
      0 5px 12px -3px rgba(239,68,68,0.5);
  }
  @keyframes megaBreathe {
    0%, 100% {
      transform: scale(1);
      box-shadow:
        0 8px 20px -8px rgba(249,115,22,0.55),
        0 3px 8px -3px rgba(239,68,68,0.4),
        0 0 0 0 rgba(249,115,22,0);

<body>

<script>
// ====================================================================
//  CHECKBOX OPTIONS
// ====================================================================
const OPTS = {
  diet: [
    { value: 'ทานได้ทุกอย่าง', exclusive: true },
    { value: 'ไม่ทานเนื้อวัว' },
    { value: 'ไม่ทานหมู' },
    { value: 'มังสวิรัติ' },
    { value: 'เจ' },
    { value: 'ฮาลาล' },
  ],
  allergy: [
    { value: 'ไม่แพ้', exclusive: true },
    { value: 'อาหารทะเล' },
    { value: 'ถั่ว' },
    { value: 'นม/ไข่' },
    { value: 'แป้งสาลี/กลูเตน' },
  ],
  medical: [
    { value: 'ไม่มี', exclusive: true },
    { value: 'เบาหวาน' },
    { value: 'ความดัน' },
    { value: 'โรคหัวใจ' },
    { value: 'ภูมิแพ้/หอบหืด' },
  ],
  medication: [
    { value: 'ไม่มี', exclusive: true },
    { value: 'ยาประจำตัว' },
  ],
};

// ====================================================================
//  STATE
// ====================================================================
const state = {
  currentStep: 'welcome',
  data: emptyData(),
  history: [],
  qrImage: '',
  logoFlower: '',
  editMode: false,
  editingRegId: '',
  donationOpen: true,
  regClosed: false,
  regBypassCode: '',
};

function emptyData() {
  return {
    group: '',
    title: '', firstName: '', lastName: '', nickname: '',
    studentId: '', nationalId: '', alumniBatch: '', position: '',
    gender: '', birthDate: '',
    phone: '', email: '',
    dietRestrictions: [], dietOther: '',
    allergies: [], allergyOther: '',
    medicalConditions: [], medicalOther: '',
    medications: [], medicationOther: '',
    roomType: '', bedType: '',
    hasCompanion: false,
    roommate: null, companion: null,
    emergencyName: '', emergencyRelation: '', emergencyPhone: '',
    consentPhoto: false,
    consentPdpa: false,
    notes: '',
    supportPersonal: '',
    supportBatch: '',
    slip: null,
  };
}

// ====================================================================
//  UTILITIES
// ====================================================================
function $(sel) { return document.querySelector(sel); }
function el(html) { const d = document.createElement('div'); d.innerHTML = html.trim(); return d.firstChild; }
function setProgress(p) { document.getElementById('progressBar').style.width = p + '%'; }

function navigate(stepName, push = true) {
  if (push && state.currentStep !== stepName) state.history.push(state.currentStep);

  // Smooth transition: fade out → render → fade in
  const root = document.getElementById('stepRoot');
  if (root) {
    root.classList.add('step-leaving');
    setTimeout(() => {
      state.currentStep = stepName;
      window.scrollTo({ top: 0, behavior: 'smooth' });
      render();
      // Force reflow ก่อนเอา class ออก
      root.classList.remove('step-leaving');
      root.classList.add('step-entering');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          root.classList.remove('step-entering');
        });
      });
    }, 180);
  } else {
    state.currentStep = stepName;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    render();
  }
}

function goBack() {
  if (state.history.length === 0) return;
  const target = state.history.pop();
  navigate(target, false);
}

function goToHome() {
  // Reset ทุกอย่างกลับเริ่มต้น
  state.data = emptyData();
  state.history = [];
  state.editMode = false;
  state.editingRegId = '';
  state.successPayload = null;
  state.donateRegistration = null;
  state.donateSlip = null;
  state.donateSlipQrAmount = null;
  state.donateSlipQrTransRef = null;
  state.donateSuccessPayload = null;
  // ถ้าปิดรับลงทะเบียนแล้ว → กลับไปหน้า "ปิดรับ" (กันย้อนกลับไปลงทะเบียน)

function handleDonateSlipFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) {
    alert('ไฟล์ใหญ่เกิน 10 MB');
    e.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = ev => {
    state.donateSlip = {
      name: file.name,
      mimeType: file.type,
      data: ev.target.result.split(',')[1],
    };
    state.donateSlipQrAmount = null;
    state.donateSlipQrTransRef = null;
    document.getElementById('donUploadBox').classList.add('has-file');
    document.getElementById('donSlipFilename').textContent = '✓ ' + file.name + ' — กำลังแสกน QR...';

    if (file.type.startsWith('image/')) {
      // ใช้ scanSlipQR แต่ผูกกับ donate state
      scanDonateSlipQR(ev.target.result);
    } else {
      document.getElementById('donSlipFilename').innerHTML =
        '✓ ' + escapeHtml(file.name) +
        '<div style="color: #6B7280; font-size: 12px; margin-top: 4px;">ℹ️ PDF ไม่สามารถสแกน QR ได้</div>';
    }
  };
  reader.readAsDataURL(file);
}

function scanDonateSlipQR(dataUrl) {
  const img = new Image();
  img.onload = async () => {
    const file = state.donateSlip;
    const filenameEl = document.getElementById('donSlipFilename');
    if (!filenameEl || !file) return;

    const renderResult = (amount) => {
      const sp = parseFloat(document.getElementById('don_supportPersonal').value) || 0;
      const sb = parseFloat(document.getElementById('don_supportBatch').value) || 0;
      const total = sp + sb;
      let statusHtml;
      if (total === 0) {
        statusHtml = '<div style="color: #6B7280; font-size: 13px; margin-top: 4px;">ℹ️ ยอดในสลิป: ' + (amount.toLocaleString()) + ' บาท (กรอกยอดบริจาคก่อน)</div>';
      } else {
        const diff = amount - total;
        const TOL = 5;
        if (Math.abs(diff) <= TOL) {
          statusHtml = '<div style="color: #16A34A; font-size: 13px; margin-top: 4px;">✅ ยอดตรง: ' + (amount.toLocaleString()) + ' บาท</div>';
        } else if (diff > TOL) {
          statusHtml = '<div style="color: #D97706; font-size: 13px; margin-top: 4px;">🟢 โอนเกิน +' + (diff.toLocaleString()) + ' บาท</div>';
        } else {
          statusHtml = '<div style="color: #DC2626; font-size: 13px; margin-top: 4px;">❌ ยอดไม่ตรง: ' + (amount.toLocaleString()) + ' บาท (ขาด ' + (Math.abs(diff).toLocaleString()) + ')</div>';
        }
      }
      filenameEl.innerHTML = '✓ ' + escapeHtml(file.name) + statusHtml;
    };

    try {
      const sizes = [img.width, 1600, 2000, 1200, 800];
      let foundCode = null;
      for (const targetW of sizes) {
        if (targetW <= 0) continue;
        const ratio = targetW / img.width;
        const w = Math.round(img.width * ratio);
        const h = Math.round(img.height * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const imageData = ctx.getImageData(0, 0, w, h);
        const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'attemptBoth' });
        if (code && code.data) { foundCode = code; break; }
      }

      if (foundCode) {
        const parsed = parseEMVCo(foundCode.data);
        state.donateSlipQrTransRef = parsed.transRef || foundCode.data.slice(0, 80);
        if (parsed.amount !== null) {
          state.donateSlipQrAmount = parsed.amount;
          renderResult(parsed.amount);
          return;
        }
        // Fallback OCR
        filenameEl.innerHTML = '✓ ' + escapeHtml(file.name) +
          '<div style="color: #6B7280; font-size: 12px; margin-top: 4px;">🔍 พบสลิป กำลังอ่านยอดด้วย OCR...</div>';
        const ocr = await ocrSlipAmount(dataUrl);
        if (ocr.amount > 0) {
          state.donateSlipQrAmount = ocr.amount;
          renderResult(ocr.amount);
        } else {
          filenameEl.innerHTML = '✓ ' + escapeHtml(file.name) +
            '<div style="color: #6B7280; font-size: 12px; margin-top: 4px;">✓ พบสลิป · ระบบจะตรวจอีกครั้งหลังส่ง</div>';
        }
        return;
      }

      // ไม่เจอ QR → OCR ตรงๆ
      filenameEl.innerHTML = '✓ ' + escapeHtml(file.name) +
        '<div style="color: #6B7280; font-size: 12px; margin-top: 4px;">🔍 กำลังอ่านยอดด้วย OCR...</div>';
      const ocr = await ocrSlipAmount(dataUrl);
      if (ocr.amount > 0) {
        state.donateSlipQrAmount = ocr.amount;
        renderResult(ocr.amount);
      } else {
        filenameEl.innerHTML = '✓ ' + escapeHtml(file.name) +
          '<div style="color: #6B7280; font-size: 12px; margin-top: 4px;">⚠️ อ่านยอดไม่ได้ — ระบบจะตรวจอีกครั้งหลังส่ง</div>';
      }
    } catch (err) {
      console.error('QR/OCR scan error:', err);
    }
  };
  img.src = dataUrl;
}

// ดึงชื่อรุ่นอัตโนมัติจาก group + alumniBatch
function deriveBatchName() {
  const g = state.data.group;
  if (g === 'student34') return 'CMMBA รุ่น 34';
  if (g === 'senior33')  return 'CMMBA รุ่น 33';
  if (g === 'alumni') {
    const b = state.data.alumniBatch || '';
    return b ? 'CMMBA ' + (b) : 'CMMBA ศิษย์เก่า';
  }
  if (g === 'faculty')   return 'อาจารย์ CMMBA';
  return 'CMMBA';
}

function calcCost() {
  let cost = 0;
  const group = state.data.group;
  const roomType = state.data.roomType;

  // ค่า support รวม 2 ยอด
  const supportTotal = (parseFloat(state.data.supportPersonal) || 0)
                     + (parseFloat(state.data.supportBatch) || 0);

  // อาจารย์ + พี่33 + น้อง34 = ฟรีทั้งหมด (ยกเว้น support)
  if (group === 'faculty' || group === 'senior33' || group === 'student34') {
    return supportTotal;
  }

  // ศิษย์เก่า:
  if (group === 'alumni') {
    if (roomType === 'single') {
      if (state.data.hasCompanion && state.data.companion) {
        const adults = parseInt(state.data.companion.adultCount, 10) || 0;
        const children = parseInt(state.data.companion.childCount, 10) || 0;
        cost += adults * 1000 + children * 500;
      } else {
        cost += 1000;
      }
    }
  }

  cost += supportTotal;
  return cost;
}

function pillGroupHtml(name, opts, selected) {
  const sel = new Set(selected || []);
  return `
    <div class="pill-grid" data-pill-group="${name}">
      ${opts.map(o => `
        <label class="pill ${o.exclusive ? 'exclusive' : ''} ${sel.has(o.value) ? 'selected' : ''}">
          <input type="checkbox" value="${o.value}" data-exclusive="${o.exclusive ? '1' : '0'}" ${sel.has(o.value) ? 'checked' : ''}>
          <span class="pill-check"></span>
          ${o.value}
        </label>
      `).join('')}
    </div>
  `;
}

function pillFieldHtml(name, label, opts, selected, otherText) {
  return `
    <div class="field">
      <label>${label} <span class="req">*</span></label>
      ${pillGroupHtml(name, opts, selected)}
      <input type="text" id="${name}_other" placeholder="อื่นๆ ระบุ (ถ้ามี)" value="${otherText || ''}">
    </div>
  `;
}

function bindPillGroup(name) {
  const wrap = document.querySelector('[data-pill-group="' + (name) + '"]');
  if (!wrap) return;
  wrap.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', () => {
      const isExclusive = cb.dataset.exclusive === '1';
      const all = wrap.querySelectorAll('input[type=checkbox]');
      if (cb.checked && isExclusive) {
        // Uncheck all others
        all.forEach(other => {
          if (other !== cb) {
            other.checked = false;
            other.closest('.pill').classList.remove('selected');
          }
        });
      } else if (cb.checked && !isExclusive) {
        // Uncheck exclusive
        all.forEach(other => {
          if (other !== cb && other.dataset.exclusive === '1') {
            other.checked = false;
            other.closest('.pill').classList.remove('selected');
          }
        });
      }
      cb.closest('.pill').classList.toggle('selected', cb.checked);
    });
  });
}

function readPillGroup(name) {
  const wrap = document.querySelector('[data-pill-group="' + (name) + '"]');
  if (!wrap) return [];
  return Array.from(wrap.querySelectorAll('input[type=checkbox]:checked')).map(cb => cb.value);
}

function pillGroupValid(name) {
  return readPillGroup(name).length > 0 || (document.getElementById(name + '_other')?.value.trim() || '');
}

// ====================================================================

// ====================================================================
function field(id, label, type, required, placeholder = '') {
  return `
    <div class="field">
      <label>${label} ${required ? '<span class="req">*</span>' : '<span class="hint">(ไม่บังคับ)</span>'}</label>
      <input id="${id}" type="${type}" ${required ? 'required' : ''} placeholder="${placeholder}">
    </div>
  `;
}

function fieldTextarea(id, label, placeholder, required) {
  return `
    <div class="field">
      <label>${label} ${required ? '<span class="req">*</span>' : '<span class="hint">(ไม่บังคับ)</span>'}</label>
      <textarea id="${id}" placeholder="${placeholder}"></textarea>
    </div>
  `;
}

function fieldFullName() {
  const cur = state.data.title || '';
  const PRESET = ['นาย', 'นาง', 'นางสาว', 'ดร.'];
  const isOther = cur && !PRESET.includes(cur);
  return `
    <div class="field" style="max-width: 200px;">
      <label>คำนำหน้า <span class="req">*</span></label>
      <select id="title" onchange="onTitleChange()">
        <option value="">-- เลือก --</option>
        <option value="นาย"     ${cur === 'นาย' ? 'selected' : ''}>นาย</option>
        <option value="นาง"     ${cur === 'นาง' ? 'selected' : ''}>นาง</option>
        <option value="นางสาว"  ${cur === 'นางสาว' ? 'selected' : ''}>นางสาว</option>
        <option value="ดร."     ${cur === 'ดร.' ? 'selected' : ''}>ดร.</option>
        <option value="__other" ${isOther ? 'selected' : ''}>อื่นๆ</option>
      </select>
      <input type="text" id="titleOther" placeholder="ระบุคำนำหน้า"
        value="${isOther ? escapeHtml(cur) : ''}"
        style="margin-top: 8px; ${isOther ? '' : 'display: none;'}"
        oninput="state.data.title = this.value.trim()">
    </div>
    <div class="field-row">
      ${field('firstName', 'ชื่อ', 'text', true)}
      ${field('lastName', 'นามสกุล', 'text', true)}
    </div>
  `;
}

function onTitleChange() {
  const sel = document.getElementById('title');
  const other = document.getElementById('titleOther');
  if (!sel || !other) return;
  if (sel.value === '__other') {
    other.style.display = '';
    other.focus();
    state.data.title = other.value.trim();
  } else {
    other.style.display = 'none';
    other.value = '';
    state.data.title = sel.value;
  }
}

function costSummaryHtml(cost) {
  let rows = '';
  const group = state.data.group;
  const roomType = state.data.roomType;
  const hasComp = state.data.hasCompanion && state.data.companion;
  const isAlumni = group === 'alumni';

  // ค่าห้อง single (เฉพาะศิษย์เก่า + single + ไม่มีผู้ติดตาม)
  if (isAlumni && roomType === 'single' && !hasComp) {
    rows += `<div class="cost-row"><span>🌙 พักคนเดียว</span><span>1,000 บาท</span></div>`;
  }
  // ผู้ติดตาม
  if (isAlumni && roomType === 'single' && hasComp) {
    const adults = parseInt(state.data.companion.adultCount, 10) || 0;
    const list = state.data.companion.list || [];
    const childExtra = list.filter(function(p){return p.type === 'เด็ก' && p.extraBed;}).length;
    const childFree = list.filter(function(p){return p.type === 'เด็ก' && !p.extraBed;}).length;
    if (adults > 0) {
      rows += '<div class="cost-row"><span>👤 ผู้ติดตามผู้ใหญ่ ' + (adults) + ' ท่าน × 1,000</span><span>' + ((adults * 1000).toLocaleString()) + ' บาท</span></div>';
    }
    if (childExtra > 0) {
      rows += '<div class="cost-row"><span>🛏️ เด็กเตียงเสริม ' + (childExtra) + ' ท่าน × 1,000</span><span>' + ((childExtra * 1000).toLocaleString()) + ' บาท</span></div>';
    }
    if (childFree > 0) {
      rows += '<div class="cost-row"><span>🛌 เด็กนอนกับผู้ปกครอง ' + (childFree) + ' ท่าน</span><span style="color: var(--leaf);">ฟรี</span></div>';
    }
  }

  const supportPersonal = parseFloat(state.data.supportPersonal) || 0;
  const supportBatch = parseFloat(state.data.supportBatch) || 0;
  if (supportPersonal > 0) {
    rows += '<div class="cost-row"><span>🙋 สนับสนุนในนามส่วนตัว</span><span>' + (supportPersonal.toLocaleString()) + ' บาท</span></div>';
  }
  if (supportBatch > 0) {
    const batchName = deriveBatchName();
    rows += '<div class="cost-row"><span>🎓 สนับสนุนในนาม ' + (batchName) + '</span><span>' + (supportBatch.toLocaleString()) + ' บาท</span></div>';
  }

  if (cost === 0) {
    return `<div class="cost-box"><div class="cost-free">🎉 ไม่มีค่าใช้จ่าย — ฟรี!</div></div>`;
  }
  return `
    <div class="cost-box">
      ${rows}
      <div class="cost-row cost-total"><span>รวมทั้งสิ้น</span><span>${cost.toLocaleString()} บาท</span></div>
    </div>
  `;
}

function qrBoxHtml() {
  if (state.qrImage) {
    return `
      <div class="qr-box">
        <img src="${state.qrImage}" alt="QR Code สำหรับโอนเงิน">
        <div class="qr-box-label">สแกน QR เพื่อโอนเงิน</div>
      </div>
    `;
  }
  return `
    <div class="notice">
      💳 <strong>การชำระเงิน</strong><br>
      ทีมงานจะติดต่อแจ้งเลขบัญชีให้ทาง LINE หรือเบอร์ที่ลงทะเบียน
    </div>
  `;
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

function savePersonalAndContinue(nextStep) {
  ['firstName','lastName','nickname','studentId','nationalId','alumniBatch','position',
   'gender','birthDate','phone','email',
   'emergencyName','emergencyRelation','emergencyPhone'].forEach(f => {
    const inp = document.getElementById(f);
    if (inp) state.data[f] = inp.value.trim();
  });
  // compute fullName
  state.data.fullName = (state.data.firstName + ' ' + state.data.lastName).trim();

  // Title: ถ้าเลือก "อื่นๆ" → อ่านจาก titleOther; อื่น → อ่านจาก select
  const titleSel = document.getElementById('title');
  if (titleSel) {
    if (titleSel.value === '__other') {
      state.data.title = (document.getElementById('titleOther')?.value || '').trim();
    } else {
      state.data.title = titleSel.value;
    }
  }

  // Pill groups
  state.data.dietRestrictions = readPillGroup('dietRestrictions');
  state.data.dietOther = readField('dietRestrictions_other');
  state.data.allergies = readPillGroup('allergies');
  state.data.allergyOther = readField('allergies_other');
  state.data.medicalConditions = readPillGroup('medicalConditions');
  state.data.medicalOther = readField('medicalConditions_other');
  state.data.medications = readPillGroup('medications');
  state.data.medicationOther = readField('medications_other');

  // Validate
  if (!state.data.title) return alertField('title', 'กรุณาเลือกคำนำหน้า');
  if (!state.data.firstName) return alertField('firstName', 'กรุณากรอกชื่อ');
  if (!state.data.lastName) return alertField('lastName', 'กรุณากรอกนามสกุล');
  if (!state.data.phone) return alertField('phone', 'กรุณากรอกเบอร์โทรศัพท์');
  state.data.phone = state.data.phone.replace(/[\s-]/g, '');
  if (!/^0\d{9}$/.test(state.data.phone)) return alertField('phone', 'รูปแบบเบอร์โทรไม่ถูกต้อง');
  if (!state.data.email) return alertField('email', 'กรุณากรอกอีเมล');
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(state.data.email)) {
    return alertField('email', 'รูปแบบอีเมลไม่ถูกต้อง');
  }

  if (state.data.group === 'student34') {
    if (!state.data.nickname) return alertField('nickname', 'กรุณากรอกชื่อเล่น');
    if (!state.data.studentId) return alertField('studentId', 'กรุณากรอกรหัสนักศึกษา');
    if (!state.data.nationalId) return alertField('nationalId', 'กรุณากรอกเลขบัตรประชาชน');
    state.data.nationalId = state.data.nationalId.replace(/[\s-]/g, '');
    if (!/^\d{13}$/.test(state.data.nationalId)) return alertField('nationalId', 'เลขบัตรประชาชนต้องเป็นตัวเลข 13 หลัก');
    if (!state.data.gender) return alertField('gender', 'กรุณาเลือกเพศ');
    if (!state.data.birthDate) return alertField('birthDate', 'กรุณากรอกวันเกิด');
    if (!state.data.emergencyName) return alertField('emergencyName', 'กรุณากรอกชื่อผู้ติดต่อฉุกเฉิน');
    if (!state.data.emergencyRelation) return alertField('emergencyRelation', 'กรุณากรอกความสัมพันธ์');
    state.data.emergencyPhone = state.data.emergencyPhone.replace(/[\s-]/g, '');
    if (!/^0\d{9}$/.test(state.data.emergencyPhone)) return alertField('emergencyPhone', 'เบอร์โทรผู้ติดต่อฉุกเฉินไม่ถูกต้อง');
  }
  if (state.data.group === 'senior33') {
    if (!state.data.nickname) return alertField('nickname', 'กรุณากรอกชื่อเล่น');
    if (!state.data.studentId) return alertField('studentId', 'กรุณากรอกรหัสนักศึกษา');
    if (!state.data.nationalId) return alertField('nationalId', 'กรุณากรอกเลขบัตรประชาชน');
    state.data.nationalId = state.data.nationalId.replace(/[\s-]/g, '');
    if (!/^\d{13}$/.test(state.data.nationalId)) return alertField('nationalId', 'เลขบัตรประชาชนต้องเป็นตัวเลข 13 หลัก');
    if (!state.data.gender) return alertField('gender', 'กรุณาเลือกเพศ');
  }
  if (state.data.group === 'alumni') {
    if (!state.data.nickname) return alertField('nickname', 'กรุณากรอกชื่อเล่น');
    if (!state.data.alumniBatch) return alertField('alumniBatch', 'กรุณาเลือกรุ่น');
    if (!state.data.gender) return alertField('gender', 'กรุณาเลือกเพศ');
  }
  if (state.data.group === 'faculty') {
    if (!state.data.title) return alertField('title', 'กรุณากรอกคำนำหน้า');
    if (!state.data.position) return alertField('position', 'กรุณากรอกตำแหน่ง/สังกัด');
  }

  // Validate pill groups
  if (!pillGroupValid('dietRestrictions')) return alert('กรุณาเลือกข้อจำกัดด้านอาหาร');
  if (!pillGroupValid('allergies')) return alert('กรุณาเลือกอาหารที่แพ้ (หรือเลือก "ไม่แพ้")');
  if (!pillGroupValid('medicalConditions')) return alert('กรุณาเลือกโรคประจำตัว (หรือเลือก "ไม่มี")');
  if (!pillGroupValid('medications')) return alert('กรุณาเลือกยาประจำตัว (หรือเลือก "ไม่มี")');

  // กลุ่มที่ทีมจัดห้องให้ → set roomType อัตโนมัติเป็น twin (พักคู่)
  if (state.data.group === 'student34' || state.data.group === 'senior33') {
    state.data.roomType = 'twin';
    state.data.bedType = '';
    state.data.roommate = null;
    state.data.hasCompanion = false;
    state.data.companion = null;
  }

  navigate(nextStep);
}

function renderCompanionList() {
  const adults = parseInt(document.getElementById('comp_adultCount')?.value || '0', 10);
  const children = parseInt(document.getElementById('comp_childCount')?.value || '0', 10);
  const listEl = document.getElementById('companionList');
  if (!listEl) return;

  if (adults + children === 0) {
    listEl.innerHTML = '<div class="field-hint" style="text-align: center; color: var(--ink-soft); padding: 12px;">เลือกจำนวนผู้ติดตามด้านบน</div>';
    return;
  }

  const existing = (state.data.companion && state.data.companion.list) || [];
  let html = '';
  let idx = 0;
  for (let i = 0; i < adults; i++) {
    html += companionPersonHtml(idx, 'ผู้ใหญ่', existing[idx] || {}, false);
    idx++;
  }
  for (let i = 0; i < children; i++) {
    html += companionPersonHtml(idx, 'เด็ก', existing[idx] || {}, true);
    idx++;
  }
  listEl.innerHTML = html;

  for (let i = 0; i < adults + children; i++) {
    bindPillGroup('cp_' + i + '_diet');
    bindPillGroup('cp_' + i + '_allergy');
    bindPillGroup('cp_' + i + '_medical');
  }

  // Bind bed choice toggle (.selected class)
  document.querySelectorAll('[data-bed-group]').forEach(function(grp) {
    grp.querySelectorAll('input[type=radio]').forEach(function(r) {
      r.addEventListener('change', function(e) {
        grp.querySelectorAll('.choice').forEach(function(c) { c.classList.remove('selected'); });
        e.target.closest('.choice').classList.add('selected');
      });
    });
  });
}

function saveCompanionAndContinue() {
  const adults = parseInt(readField('comp_adultCount'), 10) || 0;
  const children = parseInt(readField('comp_childCount'), 10) || 0;

    if (!relation) return alertField('cp_' + i + '_relation', 'กรุณากรอกความสัมพันธ์ของผู้ติดตามคนที่ ' + (i + 1));
    if (isChild && !age) return alertField('cp_' + i + '_age', 'กรุณากรอกอายุของผู้ติดตามคนที่ ' + (i + 1));
    if (!pillGroupValid('cp_' + i + '_diet')) return alert('กรุณาเลือกข้อจำกัดอาหารของผู้ติดตามคนที่ ' + (i + 1));

function handleSlipFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) {
    alert('ไฟล์ใหญ่เกิน 10 MB');
    e.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = ev => {
    state.data.slip = {
      name: file.name,
      mimeType: file.type,
      data: ev.target.result.split(',')[1],
    };
    state.data.slipQrAmount = null;
    state.data.slipQrTransRef = null;
    document.getElementById('uploadBox').classList.add('has-file');
    document.getElementById('slipFilename').textContent = '✓ ' + file.name + ' — กำลังแสกน QR...';

    // แสกน QR (เฉพาะภาพ ไม่รวม PDF)
    if (file.type.startsWith('image/')) {
      scanSlipQR(ev.target.result);
    } else {
      // PDF — ไม่ scan QR ให้กรอกยอดด้วยมือ + รอ backend ตรวจ
      document.getElementById('slipFilename').textContent = '✓ ' + file.name;
      showQrResult(null, 'PDF ไม่สามารถสแกน QR ได้ — ระบบจะตรวจสลิปด้วยวิธีอื่น');
    }
  };
  reader.readAsDataURL(file);
}

function scanSlipQR(dataUrl) {
  const img = new Image();
  img.onload = async () => {
    try {
      const sizes = [img.width, 1600, 2000, 1200, 800];
      let foundCode = null;

      for (const targetW of sizes) {
        if (targetW <= 0) continue;
        const ratio = targetW / img.width;
        const w = Math.round(img.width * ratio);
        const h = Math.round(img.height * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const imageData = ctx.getImageData(0, 0, w, h);
        const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'attemptBoth' });
        if (code && code.data) {
          console.log('[scanSlipQR] เจอ QR ที่ขนาด', w, 'x', h);
          foundCode = code;
          break;
        }
      }

      if (foundCode) {
        const parsed = parseEMVCo(foundCode.data);
        state.data.slipQrTransRef = parsed.transRef || foundCode.data.slice(0, 80);
        if (parsed.amount !== null) {
          state.data.slipQrAmount = parsed.amount;
          showQrResult(parsed.amount, null);
          return;
        }
        // เจอ QR แต่ไม่มี amount (SCB/KBANK) → fallback browser OCR (4 methods voting)
        showQrResult(null, '🔍 พบสลิป · กำลังอ่านยอดอัตโนมัติ... (รอ 5-15 วินาที)');
        const ocr = await ocrSlipAmount(dataUrl);
        if (ocr.amount > 0) {
          state.data.slipQrAmount = ocr.amount;
          showQrResult(ocr.amount, null);
        } else {
          state.data.slipQrAmount = null;
          showQrResult(null, '✓ พบสลิป · ระบบจะตรวจยอดอีกครั้งหลังส่ง');
        }
        return;
      }

      // ไม่เจอ QR → ลอง OCR ตรงๆ
      console.log('[scanSlipQR] ไม่พบ QR — fallback OCR');
      showQrResult(null, '🔍 กำลังอ่านสลิปอัตโนมัติ... (รอ 5-15 วินาที)');
      const ocr = await ocrSlipAmount(dataUrl);
      if (ocr.amount > 0) {
        state.data.slipQrAmount = ocr.amount;
        showQrResult(ocr.amount, null);
      } else {
        showQrResult(null, '⚠️ อ่านยอดอัตโนมัติไม่ได้ — ระบบจะตรวจอีกครั้งหลังส่ง');
      }
    } catch (err) {
      console.error('QR/OCR scan error:', err);
      showQrResult(null, 'แสกนล้มเหลว — ระบบจะตรวจหลังส่ง');
    }
  };
  img.onerror = () => showQrResult(null, 'อ่านภาพล้มเหลว');
  img.src = dataUrl;
}

function showQrResult(amount, errorMsg) {
  const filenameEl = document.getElementById('slipFilename');
  const file = state.data.slip;
  if (!filenameEl || !file) return;

  if (amount !== null && amount !== undefined) {
    const cost = calcCost();
    const TOLERANCE = 5;
    const diff = amount - cost;
    let statusHtml;
    if (Math.abs(diff) <= TOLERANCE) {
      statusHtml = '<div style="color: #16A34A; font-size: 13px; margin-top: 4px;">✅ ยอดตรง: ' + (amount.toLocaleString()) + ' บาท</div>';
    } else if (diff > TOLERANCE) {
      statusHtml = '<div style="color: #D97706; font-size: 13px; margin-top: 4px;">⚠️ ยอดเกิน: ' + (amount.toLocaleString()) + ' บาท (เกินมา +' + (diff.toLocaleString()) + ')<br><small>กรุณาปรับยอดบริจาค (ส่วนตัว/รุ่น) ให้ตรงสลิป หรือแนบสลิปใหม่</small></div>';
    } else {
      const retry = state.data.amountRetryCount || 0;
      const retryNote = retry >= 2
        ? `<br><small>หากแก้ไขแล้วยังไม่ตรง ระบบจะส่งให้แอดมินตรวจสอบ</small>`
        : '';
      statusHtml = '<div style="color: #DC2626; font-size: 13px; margin-top: 4px;">❌ ยอดไม่ตรง: ' + (amount.toLocaleString()) + ' บาท (ขาดอีก ' + (Math.abs(diff).toLocaleString()) + ' บาท)' + (retryNote) + '</div>';
    }
    filenameEl.innerHTML = '✓ ' + escapeHtml(file.name) + statusHtml;
  } else {
    filenameEl.innerHTML = '✓ ' + escapeHtml(file.name) +
      `<div style="color: #6B7280; font-size: 12px; margin-top: 4px;">ℹ️ ${escapeHtml(errorMsg || '')}</div>`;
  }
}

// Parse EMVCo QR string → ดึง amount (field 54) + transaction ref
// ============== Browser-side OCR (Tesseract.js) ==============
let _tesseractWorkerFull = null;   // อ่านได้ทั้งภาษา ใช้หา keyword
let _tesseractWorkerNum = null;    // อ่านเฉพาะตัวเลข แม่นกว่า

async function getTesseractWorker(mode) {
  if (mode === 'num') {
    if (_tesseractWorkerNum) return _tesseractWorkerNum;
    _tesseractWorkerNum = await Tesseract.createWorker('eng');
    await _tesseractWorkerNum.setParameters({
      tessedit_char_whitelist: '0123456789.,',
      tessedit_pageseg_mode: '6', // single block
    });
    return _tesseractWorkerNum;
  }
  if (_tesseractWorkerFull) return _tesseractWorkerFull;
  _tesseractWorkerFull = await Tesseract.createWorker(['tha', 'eng']);
  await _tesseractWorkerFull.setParameters({
    tessedit_pageseg_mode: '6',
  });
  return _tesseractWorkerFull;
}

/**
 * Pre-process แรง: grayscale + binary threshold + boost contrast
 */
function preprocessImage(dataUrl, opts) {
  opts = opts || {};
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const MAX_W = 2000;
      const ratio = img.width > MAX_W ? MAX_W / img.width : 1;
      const w = Math.round(img.width * ratio);
      const h = Math.round(img.height * ratio);
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);

      const imageData = ctx.getImageData(0, 0, w, h);
      const data = imageData.data;
      const threshold = opts.threshold || 140; // binary cutoff

      for (let i = 0; i < data.length; i += 4) {
        const gray = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
        let v;
        if (opts.binary) {
          // binary: ขาวล้วน หรือดำล้วน → ตัด background รบกวน
          v = gray > threshold ? 255 : 0;
        } else {
          // contrast boost
          v = Math.max(0, Math.min(255, ((gray - 128) * 1.6) + 128));
        }
        data[i] = v; data[i + 1] = v; data[i + 2] = v;
      }
      ctx.putImageData(imageData, 0, 0);
      resolve(canvas.toDataURL('image/png'));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

/**
 * Parse ยอดเงินจาก text — รองรับสลิปไทยทุกธนาคาร
 */
function parseSlipAmountJS(text) {
  if (!text) return 0;
  // normalize: เลขไทย → อาหรับ + ลบสัญลักษณ์ ฿ ที่อาจถูกอ่านเป็น 8
  let normalized = text
    .replace(/[\u0E50-\u0E59]/g, d => d.charCodeAt(0) - 0x0E50)
    // ฿ ติดเลข → ลบ ฿ ทิ้ง (Tesseract มักอ่าน ฿ เป็น 8)
    .replace(/฿\s*/g, '')
    // "8 8,730" หรือ "88,730" ที่เริ่มด้วย "8" ติดกับ comma แล้วมีบริบทเป็น "บาท" — ลบ 8 ตัวแรก
    // (จะทำหลัง parse แทน เพราะเสี่ยงทำลายเลขจริง)
    ;

  const raw = normalized;
  const flat = normalized.replace(/\s+/g, ' ');

  console.log('[parseSlip] raw:', raw.slice(0, 400).replace(/\n/g, ' | '));

  const candidates = [];
  let m;

  // Tier 7: keyword + decimal (สูงสุด)
  const re0 = /(?:จำนวน(?:เงิน)?|จํานวน(?:เงิน)?|amount|total|ยอด(?:เงิน|รวม|โอน|ที่โอน|ทั้งสิ้น)?|รวม(?:ทั้งสิ้น|ทั้งหมด)?|net\s*amount|grand\s*total)[\s:]*\n?[\s:]*(?:THB|฿|บาท)?[\s:]*([\d]{1,3}(?:,\d{3})*\.\d{2})/gi;
  while ((m = re0.exec(raw)) !== null) {
    const n = parseFloat(m[1].replace(/,/g, ''));
    if (n > 0 && n < 10000000) candidates.push({ value: n, score: 7 });
  }

  // Tier 5: keyword + เลข
  const re1 = /(?:จำนวน(?:เงิน)?|จํานวน(?:เงิน)?|amount|total|ยอด(?:เงิน|รวม|โอน|ที่โอน|ทั้งสิ้น)?|รวม(?:ทั้งสิ้น|ทั้งหมด)?|net\s*amount|grand\s*total)[\s:]*\n?[\s:]*(?:THB|฿|บาท)?[\s:]*([\d,]+(?:\.\d{1,2})?)/gi;
  while ((m = re1.exec(raw)) !== null) {
    const n = parseFloat(m[1].replace(/,/g, ''));
    if (n > 0 && n < 10000000) candidates.push({ value: n, score: 5 });
  }

  // Tier 5: เลขทศนิยม + บาท/THB
  const re2dec = /([\d]{1,3}(?:,\d{3})*\.\d{2})\s*(?:บาท|baht|THB)\b/gi;
  while ((m = re2dec.exec(flat)) !== null) {
    const n = parseFloat(m[1].replace(/,/g, ''));
    if (n > 0 && n < 10000000) candidates.push({ value: n, score: 5 });
  }

  // Tier 4: เลขจำนวนเต็ม + บาท
  const re2 = /([\d,]+)\s*(?:บาท|baht|THB)\b/gi;
  while ((m = re2.exec(flat)) !== null) {
    const n = parseFloat(m[1].replace(/,/g, ''));
    if (n >= 10 && n < 10000000) candidates.push({ value: n, score: 4 });
  }

  // Tier 4: ฿/THB ก่อนเลข (เผื่อ ฿ ถูกลบไปแล้ว ก็ไม่ match — แต่ THB เผื่อไว้)
  const re3 = /(?:THB|฿)\s*([\d,]+(?:\.\d{1,2})?)/gi;
  while ((m = re3.exec(flat)) !== null) {
    const n = parseFloat(m[1].replace(/,/g, ''));
    if (n > 0 && n < 10000000) candidates.push({ value: n, score: 4 });
  }

  // Tier 3 (ใหม่): เลขทศนิยม decimal 2 ตำแหน่ง — ปรากฏหลายครั้ง = boost
  const reAllDec = /([\d]{1,3}(?:,\d{3})*\.\d{2})/g;
  const decCounts = {};
  while ((m = reAllDec.exec(flat)) !== null) {
    const n = parseFloat(m[1].replace(/,/g, ''));
    if (n >= 1 && n < 10000000) {
      decCounts[n] = (decCounts[n] || 0) + 1;
    }
  }
  // ถ้ามีเลขปรากฏ ≥2 ครั้ง → boost (ที่ TrueMoney "8,730.00" โผล่ 2 ครั้ง)
  Object.keys(decCounts).forEach(k => {
    const n = parseFloat(k);
    const count = decCounts[k];
    if (count >= 2 && n > 0) {
      candidates.push({ value: n, score: 6 }); // ระหว่าง Tier 5 และ 7
    }
  });

  if (candidates.length > 0) {
    candidates.sort((a, b) => b.score - a.score || b.value - a.value);
    console.log('[parseSlip] candidates:', JSON.stringify(candidates.slice(0, 8)));
    return candidates[0].value;
  }

  // Fallback
  const reMoney = /([\d]{1,3}(?:,\d{3})+(?:\.\d{1,2})?|\d+\.\d{2})/g;
  const numbers = [];
  while ((m = reMoney.exec(flat)) !== null) {
    const n = parseFloat(m[1].replace(/,/g, ''));
    if (n >= 1 && n < 10000000) numbers.push(n);
  }
  console.log('[parseSlip] fallback numbers:', numbers);
  if (numbers.length > 0) {
    const reasonable = numbers.filter(n => n >= 10 && n <= 100000);
    if (reasonable.length > 0) return Math.max(...reasonable);
    return Math.max(...numbers);
  }
  return 0;
}

/**
 * Run Tesseract OCR + extract amount
 * @param {string} dataUrl - image data URL
 * @returns {Promise<{amount: number, text: string}>}
 */
/**
 * รัน OCR หลายวิธีพร้อมกัน → vote หา amount ที่น่าเชื่อถือสุด
 * Methods: full-text(thai+eng), num-only, binary-thresh + num-only
 * + (server Drive OCR ทำหลัง submit)
 */
async function ocrSlipAmount(dataUrl) {
  try {
    if (typeof Tesseract === 'undefined') {
      console.warn('[OCR] Tesseract not loaded');
      return { amount: 0, text: '' };
    }

    // เตรียมภาพ 2 แบบพร้อมกัน
    const [imgContrast, imgBinary] = await Promise.all([
      preprocessImage(dataUrl, { binary: false }),
      preprocessImage(dataUrl, { binary: true, threshold: 140 }),
    ]);

    // รัน 3 วิธีพร้อมกัน
    const [resultFullText, resultNumOnly, resultBinaryNum] = await Promise.all([
      runOCRMethod('full-thai-eng', imgContrast),
      runOCRMethod('num-only', imgContrast),
      runOCRMethod('num-only', imgBinary),
    ]);

    const candidates = [];
    if (resultFullText.amount > 0) candidates.push({ method: 'full-text', amount: resultFullText.amount });
    if (resultNumOnly.amount > 0) candidates.push({ method: 'num-only', amount: resultNumOnly.amount });
    if (resultBinaryNum.amount > 0) candidates.push({ method: 'binary-num', amount: resultBinaryNum.amount });

    console.log('[OCR Vote] candidates:', JSON.stringify(candidates));

    if (candidates.length === 0) {
      return { amount: 0, text: resultFullText.text };
    }

    // Vote: หา amount ที่ตรงกัน (±0.01) ≥ 2 วิธี
    const voted = voteAmount(candidates);
    console.log('[OCR Vote] winner:', voted);

    return { amount: voted, text: resultFullText.text };
  } catch (e) {
    console.error('[OCR] error:', e);
    return { amount: 0, text: '' };
  }
}

/**
 * Run OCR ด้วย method ที่กำหนด
 */
async function runOCRMethod(mode, imgDataUrl) {
  try {
    const worker = await getTesseractWorker(mode === 'num-only' ? 'num' : 'full');
    const { data } = await worker.recognize(imgDataUrl);
    const text = data.text || '';
    console.log('[OCR ' + (mode) + '] text:', text.slice(0, 200).replace(/\n/g, ' | '));
    const amount = parseSlipAmountJS(text);
    console.log('[OCR ' + (mode) + '] amount:', amount);
    return { amount, text };
  } catch (e) {
    console.error('[OCR ' + (mode) + '] error:', e);
    return { amount: 0, text: '' };
  }
}

/**
 * Vote หา amount ที่ตรงกัน — ถ้า ≥2 วิธีให้ค่าเดียวกัน → confident
 * ถ้าไม่มีตรงกัน → ใช้ value ที่มีจุดทศนิยม (น่าเชื่อถือกว่า)
 */
function voteAmount(candidates) {
  if (candidates.length === 0) return 0;
  if (candidates.length === 1) return candidates[0].amount;

  // นับ vote (จัดกลุ่มตาม amount ใกล้เคียงกัน ±0.01)
  const groups = [];
  for (const c of candidates) {
    let found = false;
    for (const g of groups) {
      if (Math.abs(g.amount - c.amount) < 0.01) {
        g.count++;
        g.methods.push(c.method);
        found = true;
        break;
      }
    }
    if (!found) groups.push({ amount: c.amount, count: 1, methods: [c.method] });
  }

  // เรียง: count มากสุดก่อน → ถ้าเท่ากัน ใช้ที่มีทศนิยม
  groups.sort((a, b) => {
    if (b.count !== a.count) return b.count - a.count;
    const aHasDecimal = a.amount % 1 !== 0;
    const bHasDecimal = b.amount % 1 !== 0;
    if (aHasDecimal !== bHasDecimal) return bHasDecimal ? 1 : -1;
    return b.amount - a.amount;
  });

  console.log('[OCR Vote] groups:', JSON.stringify(groups));
  return groups[0].amount;
}

function parseEMVCo(qrData) {
  const result = { amount: null, transRef: '' };
  if (!qrData || typeof qrData !== 'string') return result;

  // ถ้าเป็น URL → ไม่ใช่ EMVCo (ส่วนใหญ่เป็น "QR ตรวจสอบสลิป" ของ SCB/KBANK)
  // ดึง reference จาก URL parameters หรือ path
  if (/^https?:\/\//i.test(qrData)) {
    // หา ref/reference/txnId/id ใน query string หรือ path
    const refMatch = qrData.match(/[?&](?:ref|reference|txn|txnId|id|transactionId)=([^&]+)/i);
    if (refMatch) {
      result.transRef = decodeURIComponent(refMatch[1]).slice(0, 80);
    } else {
      // ใช้ URL ทั้งหมดเป็น transRef (กัน fraud — สลิปเดียวกันให้ URL เหมือนกัน)
      result.transRef = qrData.slice(0, 200);
    }
    return result;
  }

  // ลองตรวจว่าเป็น EMVCo จริงไหม (ต้องเริ่มด้วย "0002" หรือ "01")
  if (!/^\d{4}/.test(qrData)) {
    // ไม่ใช่ทั้ง URL ทั้ง EMVCo — เก็บ data ทั้งก้อนเป็น transRef
    result.transRef = qrData.slice(0, 200);
    return result;
  }

  let i = 0;
  while (i < qrData.length - 4) {
    const id = qrData.slice(i, i + 2);
    const len = parseInt(qrData.slice(i + 2, i + 4), 10);
    if (isNaN(len)) break;
    const value = qrData.slice(i + 4, i + 4 + len);

    if (id === '54') {
      const amt = parseFloat(value);
      if (!isNaN(amt)) result.amount = amt;
    }
    if (id >= '29' && id <= '51') {
      let j = 0;
      while (j < value.length - 4) {
        const subId = value.slice(j, j + 2);
        const subLen = parseInt(value.slice(j + 2, j + 4), 10);
        if (isNaN(subLen)) break;
        const subVal = value.slice(j + 4, j + 4 + subLen);
        if (subId === '02' && !result.transRef) result.transRef = subVal;
        j += 4 + subLen;
      }
    }

    i += 4 + len;
  }
  return result;
}

function showToast(msg, type, large) {
  type = type || 'error';
  // ลบ toast เก่า
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const toast = document.createElement('div');
  toast.className = 'toast toast-' + type + (large ? ' toast-large' : '');
  const icon = type === 'error' ? '⚠️' : (type === 'success' ? '✅' : 'ℹ️');
  toast.innerHTML = `<span class="toast-icon">${icon}</span><span class="toast-msg">${escapeHtml(msg).replace(/\n/g, '<br>')}</span>`;
  document.body.appendChild(toast);
  // animate in
  requestAnimationFrame(() => toast.classList.add('show'));
  // auto hide
  const duration = large ? 5000 : 4000;
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

// override built-in alert
window.alert = function(msg) { showToast(msg, 'error'); };

function alertField(id, msg) {
  showToast(msg, 'error');
  const el = document.getElementById(id);
  if (el) {
    el.focus();
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    // เพิ่ม shake animation
    el.classList.add('field-error');
    setTimeout(() => el.classList.remove('field-error'), 600);
  }
}

function submitEditLogin() {
  const email = readField('loginEmail').trim();
  const phone = readField('loginPhone').replace(/[\s-]/g, '');
  const errBox = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');

  if (!email || !phone) {
    errBox.style.display = 'block';
    errBox.innerHTML = 'กรุณากรอกทั้งอีเมลและเบอร์โทร';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> กำลังตรวจสอบ...';
  errBox.style.display = 'none';

  google.script.run
    .withSuccessHandler(res => {
      if (res.ok) {
        // Pre-fill state จากข้อมูลเดิม
        state.data = Object.assign(emptyData(), res.data);
        state.editMode = true;
        state.editingRegId = res.registrationId;
        state.history = ['welcome', 'editLogin'];
        // ไปหน้า step ตาม group ของข้อมูลเดิม → ข้าม group selection
        const groupStep = res.data && res.data.group;
        const validSteps = ['student34', 'senior33', 'alumni', 'faculty'];
        navigate(validSteps.indexOf(groupStep) >= 0 ? groupStep : 'group', true);
      } else {
        errBox.style.display = 'block';
        errBox.innerHTML = '❌ ' + res.message;
        btn.disabled = false;
        btn.innerHTML = 'เข้าสู่ระบบแก้ไข 🔓';
      }
    })
    .withFailureHandler(err => {
      errBox.style.display = 'block';
      errBox.innerHTML = '❌ เกิดข้อผิดพลาด: ' + (err.message || err);
      btn.disabled = false;
      btn.innerHTML = 'เข้าสู่ระบบแก้ไข 🔓';
    })
    .findRegistration(email, phone);
}

function submitForm() {
  state.data.consentPhoto = document.getElementById('consentPhoto').checked;
  const pdpaEl = document.getElementById('consentPdpa');
  if (pdpaEl) state.data.consentPdpa = pdpaEl.checked;
  state.data.notes = readField('notes');
  state.data.supportPersonal = readField('supportPersonal');
  state.data.supportBatch = readField('supportBatch');
  state.data.regBypassCode = state.regBypassCode || '';  // รหัสลับเปิดลงทะเบียน (ถ้ามาจากลิงก์พิเศษ)

  // ตรวจ consent ภาพ — บังคับ
  if (!state.data.consentPhoto) {
    return alert('กรุณายินยอมให้ใช้ภาพถ่าย/วิดีโอเพื่อประชาสัมพันธ์ CMMBA');
  }

  // ตรวจ PDPA consent สำหรับกลุ่มที่กรอกเลขบัตร
  if ((state.data.group === 'student34' || state.data.group === 'senior33') && !state.data.consentPdpa) {
    return alert('กรุณายินยอมให้ใช้เลขบัตรประชาชนเพื่อทำประกันการเดินทาง');
  }

  // ตรวจ QR amount ของสลิป (frontend pre-check)
  const cost = calcCost();
  if (cost > 0) {
    if (!state.data.slip || !state.data.slip.data) {
      return alert('❌ กรุณาแนบสลิปการโอนเงินก่อน');
    }
    const qrAmount = state.data.slipQrAmount;
    if (qrAmount !== null && qrAmount !== undefined) {
      const diff = qrAmount - cost;
      const TOLERANCE = 5;

      // โอนเกิน → block + ให้กลับไปปรับยอดบริจาคเอง (เพราะไม่รู้ว่าจะใส่ส่วนตัวหรือรุ่น)
      if (diff > TOLERANCE) {
        state.data.amountRetryCount = 0;
        return alert(
          '⚠️ ยอดในสลิป (' + (qrAmount.toLocaleString()) + ' บาท) เกินยอดที่ต้องโอน (' + (cost.toLocaleString()) + ' บาท)\n' +
          'เกินมา ' + (diff.toLocaleString()) + ' บาท\n\n' +
          `กรุณากลับไปปรับยอดบริจาค (ในนามส่วนตัว / ในนามรุ่น) ให้ตรงกับสลิป\n` +
          `หรือแนบสลิปที่ถูกต้อง`
        );
      }

      // โอนน้อย → ครั้งที่ 1-2 บล็อก, ครั้งที่ 3+ ให้ผ่านพร้อมแจ้งแอดมิน
      if (diff < -TOLERANCE) {
        const retry = (state.data.amountRetryCount || 0) + 1;
        state.data.amountRetryCount = retry;

        if (retry < 3) {
          return alert(
            '❌ ยอดในสลิป (' + (qrAmount.toLocaleString()) + ' บาท) น้อยกว่ายอดที่ต้องโอน (' + (cost.toLocaleString()) + ' บาท)\n' +
            'ขาดอีก ' + (Math.abs(diff).toLocaleString()) + ' บาท · ครั้งที่ ' + (retry) + '/3\n' +
            `กรุณาโอนเงินใหม่ให้ครบ แล้วแนบสลิปอีกครั้ง`
          );
        }
        // ครั้งที่ 3+ → ให้ผ่าน ติด flag adminReview
        state.data.adminReviewFlag = true;
        state.data.adminReviewReason = 'ระบบตรวจยอดสลิปได้ ' + (qrAmount.toLocaleString()) + ' บาท ขาดจาก ' + (cost.toLocaleString()) + ' (' + (retry) + ' ครั้ง)';
        if (!confirm(
          `⚠️ ระบบตรวจยอดสลิปไม่ตรง 3 ครั้ง\n\n` +
          'ยอดในสลิป: ' + (qrAmount.toLocaleString()) + ' บาท\n' +
          'ยอดที่ต้องโอน: ' + (cost.toLocaleString()) + ' บาท\n\n' +
          `ระบบจะบันทึกข้อมูลและส่งให้ทีมแอดมินตรวจสอบ\n` +
          `(หากระบบอ่านสลิปผิด แอดมินจะแก้ให้)\n\n` +
          `ต้องการดำเนินการต่อหรือไม่?`
        )) {
          return;
        }
      }
    } else {
      // อ่านยอดไม่ได้ — ครั้งที่ 1-2 บล็อก, ครั้งที่ 3+ ให้ผ่านพร้อมแจ้งแอดมิน
      const retry = (state.data.amountUnreadableCount || 0) + 1;
      state.data.amountUnreadableCount = retry;

      if (retry < 3) {
        return alert(
          '❌ ระบบตรวจยอดในสลิปไม่ได้ (ครั้งที่ ' + retry + '/3)\n\n' +
          'กรุณาแนบสลิปที่ชัดเจน:\n' +
          '• ภาพไม่เบลอ ไม่บิดเบี้ยว\n' +
          '• มีตัวเลขยอดเงินอ่านได้ชัด\n' +
          '• ครอบทั้งสลิปไม่ตัดมุม\n' +
          '• ใช้ภาพ JPG/PNG (ไฟล์ PDF จะอ่านไม่ได้)\n\n' +
          'ยอดที่ต้องโอน: ' + cost.toLocaleString() + ' บาท'
        );
      }
      // ครั้งที่ 3+ → ให้ผ่าน + ส่งให้แอดมินตรวจ
      state.data.adminReviewFlag = true;
      state.data.adminReviewReason = 'ระบบไม่สามารถอ่านยอดในสลิปได้ (' + retry + ' ครั้ง)';
      if (!confirm(
        '⚠️ ระบบตรวจยอดในสลิปไม่ได้ 3 ครั้ง\n\n' +
        'ยอดที่ต้องโอน: ' + cost.toLocaleString() + ' บาท\n\n' +
        'ระบบจะบันทึกข้อมูลและส่งให้ทีมแอดมินตรวจสอบสลิปด้วยตา\n' +
        '(หากแนบสลิปไม่ตรงจะถูกปฏิเสธ)\n\n' +
        'ต้องการดำเนินการต่อหรือไม่?'
      )) {
        return;
      }
    }
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  const hasSlip = state.data.slip && state.data.slip.data;
  const labelDefault = state.editMode ? 'บันทึกการแก้ไข ✏️' : 'ลงทะเบียน 🌺';
  btn.innerHTML = hasSlip
    ? '<span class="spinner"></span> กำลังตรวจสลิป...'
    : '<span class="spinner"></span> กำลังส่ง...';

  const handler = (res) => {
    if (res.ok) {
      // เก็บข้อมูล success ไว้ใน state ก่อน navigate
      state.successPayload = {
        regId: res.registrationId,
        cost: res.cost,
        ocrAmount: res.ocrAmount,
        ocrStatus: res.ocrStatus,
        isEdit: state.editMode,
      };
      navigate('success', false);
    } else {
      alert('❌ ' + res.message);
      btn.disabled = false;
      btn.innerHTML = labelDefault;
    }
  };

  const failHandler = err => {
    alert('❌ เกิดข้อผิดพลาด: ' + (err.message || err));
    btn.disabled = false;
    btn.innerHTML = labelDefault;
  };

  if (state.editMode) {
    google.script.run
      .withSuccessHandler(handler)
      .withFailureHandler(failHandler)
      .updateRegistration(state.editingRegId, state.data);
  } else {
    google.script.run
      .withSuccessHandler(handler)
      .withFailureHandler(failHandler)
      .submitRegistration(state.data);
  }
}

// ====================================================================
//  RENDER + BOOTSTRAP
// ====================================================================
function render() {
  const root = document.getElementById('stepRoot');
  const stepFn = steps[state.currentStep];
  if (!stepFn) {
    root.innerHTML = '<div class="card">ขออภัย เกิดข้อผิดพลาด</div>';
    return;
  }
  const step = stepFn();
  setProgress(step.progress);
  root.innerHTML = step.html;
  if (step.onMount) step.onMount();

  // Toggle body class: landing-mode ตอน welcome, form-mode ตอนกรอก
  if (state.currentStep === 'welcome' || state.currentStep === 'closed') {
    document.body.classList.add('landing-mode');
    document.body.classList.remove('form-mode');
    const pw = document.getElementById('progressWrap');
    if (pw) pw.style.display = state.currentStep === 'welcome' ? 'none' : '';
  } else {
    document.body.classList.remove('landing-mode');
    document.body.classList.add('form-mode');
    const pw = document.getElementById('progressWrap');
    if (pw) pw.style.display = '';
  }
}

window.addEventListener('DOMContentLoaded', () => {
  // ตั้ง --vh ตามขนาด viewport จริง
  function setVh() {
    const h = document.documentElement.clientHeight;
    document.documentElement.style.setProperty('--vh', h + 'px');
  }
  setVh();
  window.addEventListener('resize', setVh);
  [50, 200, 500, 1000, 2000, 4000].forEach(ms => setTimeout(setVh, ms));
  if (window.ResizeObserver) {
    new ResizeObserver(setVh).observe(document.body);
  }

  const splash = document.getElementById('splash');
  const appRoot = document.getElementById('appRoot');

  // Helper: wrap google.script.run as Promise — timeout 3s
  function callBackend(method, ...args) {
    return new Promise(resolve => {
      let timer = setTimeout(() => {
        console.warn('[Timeout 30s] ' + method);
        resolve(null);
      }, 30000); // 30s — Apps Script cold start
      const runner = google.script.run
        .withSuccessHandler(res => { clearTimeout(timer); resolve(res); })
        .withFailureHandler(err => {
          clearTimeout(timer);
          console.error('[Backend Error] ' + method + ':', err);
          resolve(null);
        });
      runner[method](...args);
    });
  }

  // Helper: preload image — timeout 6s (เหมือนโค้ดเก่า)
  function preloadImage(src) {
    return new Promise(resolve => {
      if (!src) { resolve(null); return; }
      const img = new Image();
      img.onload = () => resolve(src);
      img.onerror = () => resolve(null);
      img.src = src;
      setTimeout(() => resolve(null), 6000);
    });
  }

  // Helper: อ่าน query param ของ URL จริง (เช่น ?key=...) — สำหรับลิงก์ลับเปิดลงทะเบียน
  function getUrlParams() {
    return new Promise(resolve => {
      try {
        if (google.script && google.script.url && google.script.url.getLocation) {
          let done = false;
          google.script.url.getLocation(loc => { if (!done) { done = true; resolve((loc && loc.parameter) || {}); } });
          setTimeout(() => { if (!done) { done = true; resolve({}); } }, 3000);
        } else { resolve({}); }
      } catch (e) { resolve({}); }
    });
  }

  // ===== Phase 1: load all backend data =====
  Promise.all([
    callBackend('getConfig'),
    callBackend('getAssets'),
    callBackend('getQRImage'),
    getUrlParams(),
  ]).then(([cfg, assets, qrImage, params]) => {
    state.qrImage = qrImage || '';

    // ลิงก์ลับเปิดลงทะเบียน: ?key=... → บังคับเปิดฟอร์ม (backend ตรวจรหัสอีกครั้งตอน submit)
    const openKey = String((params && (params.key || params.open)) || '').trim();
    state.regBypassCode = openKey;
    const forceOpen = !!openKey;

    const isClosed = (cfg && !cfg.isOpen) && !forceOpen;
    state.regClosed = !!isClosed;
    state.donationOpen = cfg ? (cfg.donationOpen !== false) : true;
    assets = assets || {};

    // ===== Phase 2: preload images (best effort — ไม่ block ถ้าโหลดไม่ได้) =====
    return Promise.all([
      preloadImage(assets.bg),
      preloadImage(assets.bgMobile),
      preloadImage(assets.logoAloha),
      preloadImage(assets.logoKu),
      preloadImage(assets.logoCmmba),
      preloadImage(assets.logoFlower),
    ]).then(() => ({ assets, isClosed }));
  }).then(({ assets, isClosed }) => {
    // ===== Phase 3: apply assets to DOM (defensive — ใช้ตัวที่มี) =====
    if (assets.bg) {
      document.documentElement.style.setProperty('--bg-image-landscape', "url('" + assets.bg + "')");
    }
    if (assets.bgMobile) {
      document.documentElement.style.setProperty('--bg-image-portrait', "url('" + assets.bgMobile + "')");
    }
    if (assets.bg || assets.bgMobile) {
      document.body.classList.add('has-bg-image');
    }

    const logoAloha = document.getElementById('logoAloha');
    const logoAlohaWrap = document.getElementById('logoAlohaWrap');
    if (assets.logoAloha && logoAloha) {
      logoAloha.src = assets.logoAloha;
      if (logoAlohaWrap) logoAlohaWrap.style.display = 'inline-block';
    }

    // logo flower ใน welcome card
    if (assets.logoFlower) {
      state.logoFlower = assets.logoFlower;
    }

    // logo bar (KU + CMMBA)
    const logoBar = document.getElementById('logoBar');
    const logoKu = document.getElementById('logoKu');
    const logoCmmba = document.getElementById('logoCmmba');
    let hasLogo = false;
    if (assets.logoKu && logoKu) { logoKu.src = assets.logoKu; hasLogo = true; }
    if (assets.logoCmmba && logoCmmba) { logoCmmba.src = assets.logoCmmba; hasLogo = true; }
    if (logoBar && hasLogo) logoBar.style.display = 'flex';

    // Render content
    if (isClosed) {
      navigate('closed', false);
      const pw = document.getElementById('progressWrap');
      if (pw) pw.style.display = 'none';
    } else {
      render();
    }

    // Recheck viewport size
    setTimeout(setVh, 50);

    // ===== Phase 4: reveal everything together =====
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        if (appRoot) appRoot.classList.add('app-ready');
        if (splash) {
          splash.classList.add('splash-hide');
          // ลบ splash หลัง fade out เสร็จ
          setTimeout(() => splash.remove(), 600);
        }
      });
    });
  });
});

  body.landing-mode .hero-logo { width: clamp(150px, 15vw, 200px) !important; }

  body.landing-mode .welcome-card .notice { padding: 9px 13px !important; font-size: 13px !important; line-height: 1.5 !important; margin: 6px 0 0 !important; }

  padding: 24px 24px !important;

  .btn-mega-donate { padding: 18px 18px !important; }
  .btn-mega-donate .btn-mega-icon { font-size: 22px !important; }
  .btn-mega-donate .btn-mega-label { font-size: 17px !important; }

/* ปุ่ม register — shimmer sweep + glow ring */
.btn-mega-register {
  position: relative;
  z-index: 1;
}
.btn-mega-register::before {
  background: linear-gradient(105deg,
    transparent 30%,
    rgba(255,255,255,0.55) 50%,
    transparent 70%) !important;
  width: 100%;
  left: -100%;
  transition: none !important;
  animation: shimmerSweep 3.8s ease-in-out infinite;
}
.btn-mega-register:hover::before {
  left: -100% !important;
}
@keyframes shimmerSweep {
  0%   { left: -100%; }
  55%, 100% { left: 100%; }
}
.btn-mega-register::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 22px;
  background: linear-gradient(135deg, #F97316, #EF4444, #FB7185, #F97316);
  background-size: 200% 200%;
  z-index: -1;
  filter: blur(10px);
  opacity: 0.55;
  animation: glowPulse 2.6s ease-in-out infinite, hueDrift 6s linear infinite;
  pointer-events: none;
}
@keyframes glowPulse {
  0%, 100% { opacity: 0.35; transform: scale(0.97); }
  50%      { opacity: 0.75; transform: scale(1.05); }
}
@keyframes hueDrift {
  0%   { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}
