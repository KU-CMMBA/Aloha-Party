    ab.onclick = function() {
      qs.style.display = 'none';
      note.style.display = 'none';
      ab.style.display = 'none';
      cb.textContent = T.B;
      var f = el('div', 'display:flex;flex-direction:column;gap:10px;'); f.id = 'qdForm';
      f.appendChild(el('h3', 'margin:0;font-size:20px;color:#0369A1;text-align:center;', T.FT));

      function rd(v, lb, ck) {
        var l = el('label', 'display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid #E5E7EB;border-radius:10px;cursor:pointer;font-size:14px;');
        var r = el('input'); r.type = 'radio'; r.name = 'qda'; r.value = v; r.checked = ck;
        l.appendChild(r); l.appendChild(document.createTextNode(' ' + lb));
        f.appendChild(l); return r;
      }
      var rA = rd('a', T.AN, true);
      var rN = rd('n', T.NM, false);
      var nb = el('div', 'display:none;flex-direction:column;gap:8px;');
      function ip(ph) {
        var i = el('input', 'padding:11px 13px;border:1.5px solid #E5E7EB;border-radius:10px;font-size:14px;font-family:inherit;');
        i.placeholder = ph; nb.appendChild(i); return i;
      }
      var fn = ip(T.PFN), ln = ip(T.PLN), nn = ip(T.PNN), bn = ip(T.PBN);
      f.appendChild(nb);
      rA.onchange = function() { nb.style.display = 'none'; };
      rN.onchange = function() { nb.style.display = 'flex'; };

      var ul = el('label');
      ul.className = 'upload-box';
      ul.style.cursor = 'pointer';
      var ui = el('div', null, String.fromCodePoint(0x1F9FE)); ui.className = 'upload-icon';
      var ut = el('div'); ut.className = 'upload-text';
      ut.appendChild(el('strong', null, T.UP));
      var uh = el('div', 'font-size:12px;color:#6B7280;margin-top:4px;', T.UH);
      var ufn = el('div'); ufn.className = 'upload-filename';
      ul.appendChild(ui); ul.appendChild(ut); ul.appendChild(uh); ul.appendChild(ufn);
      ul.onclick = function(e) { e.preventDefault(); fi.click(); };
      f.appendChild(ul);

      var sb = el('button', 'padding:14px;font-size:16px;font-weight:600;background:linear-gradient(135deg,#F97316,#EF4444);color:white;border:none;border-radius:10px;cursor:pointer;margin-top:4px;opacity:0.5;', T.SAVE);
      sb.disabled = true;
      f.appendChild(sb);

      info.insertBefore(f, br);

      var slip = null, qrAmt = null, qrRef = null;
      var setAmt = function(a) {
        qrAmt = a;
        ufn.textContent = String.fromCodePoint(0x2713) + ' ' + slip.name + ' \u00b7 ' + a.toLocaleString() + T.BAHT;
      };

      fi.onchange = function(e) {
        var file = e.target.files[0];
        if (!file) return;
        if (file.size > 10 * 1024 * 1024) { setSt(T.ESZ, '#DC2626'); return; }
        var r = new FileReader();
        r.onload = function(ev) {
          slip = { name: file.name, mimeType: file.type, data: ev.target.result.split(',')[1] };
          ufn.textContent = String.fromCodePoint(0x2713) + ' ' + file.name;
          ul.classList.add('has-file');
          sb.disabled = false; sb.style.opacity = '1';
          setSt('', '');
          if (file.type.indexOf('image/') === 0) {
            scanQR(ev.target.result, function(p) {
              if (p) {
                qrRef = p.transRef || null;
                if (p.amount != null) { setAmt(p.amount); return; }
              }
              if (typeof ocrSlipAmount === 'function') {
                setSt(T.OCR, '#6B7280');
                ocrSlipAmount(ev.target.result).then(function(o) {
                  var a = (o && o.amount) || 0;
                  if (a > 0) { setAmt(a); setSt('', ''); }
                  else { setSt(T.OWAR, '#92400e'); }
                }).catch(function() { setSt('', ''); });
              }
            });
          }
        };
        r.readAsDataURL(file);
      };

      sb.onclick = function() {
        if (!slip) return;
        sb.disabled = true; sb.style.opacity = '0.5';
        setSt(T.LD, '#6B7280');
        var p = { slip: slip };
        if (qrAmt != null) p.slipQrAmount = qrAmt;
        if (qrRef) p.slipQrTransRef = qrRef;
        if (rN.checked) {
          p.donor = {
            firstName: (fn.value||'').trim(),
            lastName: (ln.value||'').trim(),
            nickname: (nn.value||'').trim(),
            batch: (bn.value||'').trim()
          };
        }
        google.script.run
          .withSuccessHandler(function(res) {
            if (res && res.ok) {
              while (md.firstChild) md.removeChild(md.firstChild);
              var bx = el('div', 'text-align:center;padding:32px 16px;');
              bx.appendChild(el('div', 'font-size:64px;margin-bottom:12px;', String.fromCodePoint(0x1F33A)));
              bx.appendChild(el('h2', 'font-family:Pacifico,cursive;font-size:36px;color:#075985;margin:0 0 12px;', 'Mahalo!'));
              bx.appendChild(el('p', 'color:#475569;font-size:15px;line-height:1.7;margin:0 0 16px;', T.OK));
              var amt = (res && res.ocrAmount) || 0;
              if (amt > 0) bx.appendChild(el('div', 'font-size:24px;font-weight:700;color:#075985;margin:8px 0 20px;', amt.toLocaleString() + T.BAHT));
              var cb2 = el('button', 'padding:12px 32px;font-size:15px;background:#F3F4F6;color:#374151;border:none;border-radius:10px;cursor:pointer;', T.C);
              cb2.onclick = function() { ov.remove(); };
              bx.appendChild(cb2);
              md.appendChild(bx);
            } else {
              setSt(T.ER + ((res&&res.message)||''), '#DC2626');
              sb.disabled = false; sb.style.opacity = '1';
            }
          })
          .withFailureHandler(function(err) {
            setSt(T.ER + (err.message||err), '#DC2626');
            sb.disabled = false; sb.style.opacity = '1';
          })
          .submitQuickDonation(p);
      };
    };

    ov.appendChild(md);
    ov.addEventListener('click', function(e) { if (e.target === ov) ov.remove(); });
    document.body.appendChild(ov);
  }

    if (ft && !ft.getAttribute('data-dg')) {
      ft.setAttribute('data-dg', '1');
      ft.addEventListener('click', function(e) {
        // \u0e04\u0e25\u0e34\u0e01\u0e17\u0e35\u0e48 Policy \u2192 \u0e40\u0e1b\u0e34\u0e14 PDPA \u0e15\u0e32\u0e21\u0e40\u0e14\u0e34\u0e21 \u0e44\u0e21\u0e48\u0e43\u0e0a\u0e48\u0e25\u0e34\u0e07\u0e01\u0e4c\u0e25\u0e31\u0e1a
        if (e.target && e.target.classList && e.target.classList.contains('pd-link')) return;
        openDisplayGate();
      });
    }
    document.querySelectorAll('.hero-meta-row span').forEach(function(s) {
      if (s.textContent.indexOf('Oakwood') >= 0 && !s.getAttribute('data-link')) {
        s.setAttribute('data-link', '1');
        s.style.cursor = 'pointer';
        s.onclick = function() {
          window.open('https://www.discoverasr.com/th/oakwood/thailand/oakwood-hotel-residence-sri-racha', '_blank');
        };
      }
      if (s.textContent.indexOf('\u0e2a.\u0e04.') >= 0 && !s.getAttribute('data-cal')) {
        s.setAttribute('data-cal', '1');
        s.style.cursor = 'pointer';
        s.onclick = openCal;
      }
      if (s.textContent.indexOf('Dress') >= 0 && !s.getAttribute('data-dr')) {
        s.setAttribute('data-dr', '1');
        s.style.cursor = 'pointer';
        s.onclick = function() {
          if (document.getElementById('drOv')) return;
          var ov = el('div', 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99998;display:flex;align-items:center;justify-content:center;padding:16px;');
          ov.id = 'drOv';
          var md = el('div', 'background:white;border-radius:20px;padding:24px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px;');
          md.appendChild(el('h2', 'margin:0;font-size:20px;color:#0369A1;text-align:center;', '\ud83c\udf3a \u0e44\u0e2d\u0e40\u0e14\u0e35\u0e22\u0e0a\u0e38\u0e14\u0e2e\u0e32\u0e27\u0e32\u0e22'));
          var pb = el('button', 'padding:13px;font-size:14px;font-weight:600;background:#E60023;color:white;border:none;border-radius:10px;cursor:pointer;', '\ud83d\udccc Pinterest');
          pb.onclick = function() { window.open('https://www.pinterest.com/search/pins/?q=hawaiian+aloha+party+outfit', '_blank'); };
          md.appendChild(pb);
          var gb2 = el('button', 'padding:13px;font-size:14px;font-weight:600;background:#4285F4;color:white;border:none;border-radius:10px;cursor:pointer;', '\ud83d\udd0d Google Images');
          gb2.onclick = function() { window.open('https://www.google.com/search?q=hawaiian+aloha+party+outfit&tbm=isch', '_blank'); };
          md.appendChild(gb2);
          var cb3 = el('button', 'padding:11px;font-size:13px;background:#F3F4F6;color:#374151;border:none;border-radius:10px;cursor:pointer;', T.C);
          cb3.onclick = function() { ov.remove(); };
          md.appendChild(cb3);
          ov.appendChild(md);
          ov.addEventListener('click', function(e) { if (e.target === ov) ov.remove(); });
          document.body.appendChild(ov);
        };
      }
    });
    document.querySelectorAll('.card').forEach(function(c) {
      if (c.getAttribute('data-home') === '1') return;
      if (!c.querySelector('.step-label')) return;
      if (c.querySelector('.btn-link-edit')) { c.setAttribute('data-home','1'); return; }
      if (c.classList.contains('welcome-card')) return;
      c.setAttribute('data-home','1');
      var w = document.createElement('div');
      w.style.cssText = 'text-align:center;margin-top:14px;';
      var b = document.createElement('button');
      b.className = 'btn-link-edit';
      b.textContent = '\ud83c\udfe0 \u0e01\u0e25\u0e31\u0e1a\u0e2a\u0e39\u0e48\u0e2b\u0e19\u0e49\u0e32\u0e2b\u0e25\u0e31\u0e01';
      b.onclick = function() { if (typeof goToHome === 'function') goToHome(); };
      w.appendChild(b);
      c.appendChild(w);
    });
  }

  if (typeof MutationObserver !== 'undefined') {
    new MutationObserver(function() { tryAll(); }).observe(document.body, { childList: true, subtree: true });
  }
  setTimeout(tryAll, 100);
  setTimeout(tryAll, 500);
  setTimeout(tryAll, 1500);
})();
</script>
